<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <form action="">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <div class="row-icon">
                    <input type="email" name="email" id="email" placeholder="-------@gmail.com"class="form-input">
                    <img src="https://img.icons8.com/?size=100&id=NuuGQCcn31b0&format=png&color=000000" alt="icon gmail" class="icon">
                </div>
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="row-icon">
                    <input type="password" name="password" id="password" placeholder="password"class="form-input">
                    <img src="https://img.icons8.com/?size=100&id=94&format=png&color=000000" alt="icon password" class="icon">
                </div>
            </div>
            <div class="form-group">
                <div class="form-checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" name="remember"
                            value="remember"><span> remember</span>
                    </div>
                </div>
                <a href=""><button class="form-button login-button">Login</button></a>
                <a href=""><button class="form-button logout-button">Create account</button></a>
                
        </form>
    </div>
</body>
</html>
