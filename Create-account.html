<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create-account</title>
    <link rel="stylesheet" href="../css/Create-account.css">
</head>
<body class="create-account">
    <div class="wrapper-create-account">
        <div class="card-img-ca">
            <img src="https://media.smallbiztrends.com/2025/07/grocery-store-employee-using-tablet-for-inventory-management.jpg" alt="img-ca" class="img-ca">
        </div>

        <div class="card-create-account">
        <h2>Create Account</h2>
        <p class="form-subtitle-ca">Join us and start shopping today</p>
        <form action="">
            <div class="row-name">
                <div class="form-group-ca">
                    <label for="fname" class="form-label-ca">First name</label>
                    <div class="row-icon-ca">
                        <input type="fname" name="fname" id="fname" placeholder="first name"class="form-input-ca">
                        <img src="https://img.icons8.com/?size=100&id=rrtYnzKMTlUr&format=png&color=FFFFFF" alt="icon fname" class="icon-ca">
                    </div>
                </div>
                <div class="form-group-ca">
                    <label for="lname" class="form-label-ca">Last name</label>
                    <div class="row-icon-ca">
                        <input type="lname" name="lname" id="lname" placeholder="Last name"class="form-input-ca">
                        <img src="https://img.icons8.com/?size=100&id=rrtYnzKMTlUr&format=png&color=FFFFFF" alt="icon gmail" class="icon-ca">
                    </div>
                </div>
            </div>
            <div class="form-group-ca">
                <label for="email" class="form-label-ca">Email</label>
                <div class="row-icon-ca">
                    <input type="email" name="email" id="email" placeholder="-------@gmail.com"class="form-input-ca">
                    <img src="https://img.icons8.com/?size=100&id=6H65NWsqha0Z&format=png&color=FFFFFF" alt="icon gmail" class="icon-ca">
                </div>
            </div>
            <div class="form-group-ca">
                <label for="password" class="form-label-ca">Password</label>
                <div class="row-icon-ca">
                    <input type="password" name="password" id="password" placeholder="password"class="form-input-ca">
                    <img src="https://img.icons8.com/?size=100&id=pogC0QOlKXEm&format=png&color=FFFFFF" alt="icon password" class="icon-ca">
                </div>
            </div>
            <div class="form-group-ca">
                <label for="Confirm Password" class="form-label-ca">Confirm Password</label>
                <div class="row-icon-ca">
                    <input type="Confirm Password" name="Confirm Password" id="Confirm Password" placeholder="Confirm Password"class="form-input-ca">
                    <img src="https://img.icons8.com/?size=100&id=pogC0QOlKXEm&format=png&color=FFFFFF" alt="icon password" class="icon-ca">
                </div>
            </div>
            <div class="form-group-ca">
                <div class="form-checkbox-ca-group">
                    <div class="checkbox-ca-item">
                        <input type="checkbox" name="agree"
                            value="agree"><span> I agree to the Terms & Privacy Policy</span>
                    </div>
                </div>
                <a href=""><button class="form-button-ca create-account-button">Create Account</button></a>
                <p>Already have an account? <a href="">Login</a></p>
                
        </form>
    </div>
    </div>
</body>
</html>
